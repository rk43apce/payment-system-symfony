monolog:
    channels: ['payment']
    handlers:
        main:
            type: stream
            path: '%kernel.logs_dir%/%kernel.environment%.log'
            level: debug
            channels: ['!event']
        payment:
            type: stream
            path: '%kernel.logs_dir%/payment.log'
            level: info
            channels: ['payment']
        console:
            type: console
            process_psr_3_messages: false
            channels: ['!event', '!doctrine', '!console']